<!DOCTYPE html>
<html>

<head>
	<title>Aegis Ocean</title>
	<style>
		body {
			margin: 0;
			background: #000a1a;
			overflow: hidden;
			font-family: monospace;
		}

		#ui {
			position: fixed;
			top: 20px;
			right: 20px;
			color: white;
			width: 300px;
		}

		.panel {
			background: rgba(0, 20, 40, 0.85);
			border: 1px solid #00ffcc;
			padding: 14px;
			border-radius: 8px;
			margin-bottom: 10px;
		}

		.toggle-btn {
			background: rgba(0, 255, 204, 0.15);
			color: #00ffcc;
			border: 1px solid #00ffcc;
			padding: 4px 10px;
			cursor: pointer;
			border-radius: 4px;
			margin: 2px;
		}

		.toggle-btn.active {
			background: #00ffcc;
			color: #000;
		}

		#depth-slider {
			width: 100%;
		}

		#enter-vr {
			background: #00ffcc;
			color: #000;
			border: none;
			padding: 8px 16px;
			cursor: pointer;
			border-radius: 4px;
			width: 100%;
			margin-top: 8px;
		}

		/* ── SENSOR PANEL OVERLAY ── */
		.sensor-panel {
			background: rgba(0, 20, 40, 0.5);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			border: 1px solid rgba(0, 255, 204, 0.3);
			border-radius: 12px;
			padding: 16px;
			margin-bottom: 10px;
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
		}

		.sensor-title {
			color: #fff;
			font-size: 13px;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			font-weight: 800;
			letter-spacing: 1.5px;
			margin-bottom: 14px;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.sim-badge {
			background: rgba(255, 170, 0, 0.15);
			color: #ffcc00;
			border: 1px solid #ffcc00;
			font-size: 9px;
			padding: 3px 6px;
			border-radius: 6px;
			letter-spacing: 0.5px;
			display: none; /* hidden until true */
		}

		.sensor-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 10px;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		}

		.sensor-label {
			color: #88ccff;
			font-size: 13px;
			font-weight: 500;
		}

		.sensor-value {
			color: #00ffcc;
			font-size: 20px;
			font-weight: 700;
			text-shadow: 0 0 12px rgba(0, 255, 204, 0.6);
		}

		.sensor-unit {
			font-size: 13px;
			color: rgba(0, 255, 204, 0.7);
			font-weight: 500;
		}
	</style>
</head>

<body>
	<div id='ui'>
		<div class='panel'>
			<div style='color:#00ffcc; font-weight:bold; margin-bottom:8px;'>AEGIS OCEAN SENTINEL</div>
			<div id='alert-text'>Monitoring California Current...</div>
			<audio id='alert-audio' controls style='width:100%;margin-top:8px;display:none;'></audio>
		</div>
		<div class='panel'>
			<div style='font-size:11px;color:#aaa;margin-bottom:6px;'>VIEW MODE</div>
			<button class='toggle-btn active' onclick='setMode(this,"temp")'>Temperature</button>
			<button class='toggle-btn' onclick='setMode(this,"turbulence")'>Turbulence</button>
			<button class='toggle-btn' onclick='setMode(this,"sealevel")'>Sea Level</button>
		</div>
		<div class='panel'>
			<div style='font-size:11px;color:#aaa;margin-bottom:6px;'>
				DEPTH: <span id='depth-label'>Surface</span>
			</div>
			<input id='depth-slider' type='range' min='0' max='2000' value='0' step='50'
				oninput='updateDepth(this.value)'>
		</div>
		<div class='sensor-panel'>
			<div class='sensor-title'>
				SENSOR FEEDS
				<span id='sim-badge' class='sim-badge'>SIMULATED MODE</span>
			</div>
			<div class='sensor-row'>
				<div class='sensor-label'>Temperature</div>
				<div class='sensor-value'><span id='lv-temp'>--</span><span class='sensor-unit'>°C</span></div>
			</div>
			<div class='sensor-row'>
				<div class='sensor-label'>Distance</div>
				<div class='sensor-value'><span id='lv-dist'>--</span><span class='sensor-unit'> mm</span></div>
			</div>
			<div class='sensor-row'>
				<div class='sensor-label'>Turbulence</div>
				<div class='sensor-value'><span id='lv-turb'>--</span><span class='sensor-unit'> m/s²</span></div>
			</div>
			<div class='sensor-row' style='margin-top: 14px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);'>
				<div class='sensor-label'>System Status</div>
				<div class='sensor-value' id='lv-status' style='font-size: 15px; text-shadow: none; color: #00ff00;'>NOMINAL</div>
			</div>
			
			<div class='sensor-row' style='margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); flex-direction: column; align-items: flex-start;'>
				<div class='sensor-label' style='color:#ffaa00; margin-bottom: 6px;'>Sentinel Insights</div>
				<div id='insight-text' style='font-size: 12px; color:#aaa; font-style: italic; min-height: 38px; line-height: 1.4;'>Awaiting data stabilization...</div>
			</div>

			<button class='toggle-btn' onclick='calibrateSensors()' style='width: 100%; border-color: #ffcc00; color: #ffcc00; margin-top: 8px;'>Calibrate (Zero) Sensors</button>
		</div>
		<div class='panel' style='font-size:11px; max-height:130px; overflow-y:auto;'>
			<div style='color:#1DA1F2;margin-bottom:5px;'>X SOCIAL SIGNALS</div>
			<div id='x-posts'>Loading...</div>
		</div>
		<button id='enter-vr' onclick='enterVR()'>Enter VR Mode (stretch goal)</button>
	</div>

	<script type='module'>
		import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';

		const scene = new THREE.Scene();
		const colorNormal = new THREE.Color(0x000a1a);
		const colorSpike  = new THREE.Color(0x550000);
		scene.background = colorNormal;
		const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.001, 100);
		camera.position.set(0, 0, 3.5);
		const renderer = new THREE.WebGLRenderer({ antialias: true });
		renderer.setSize(innerWidth, innerHeight);
		renderer.xr.enabled = true;
		document.body.appendChild(renderer.domElement);

		// ── ORBIT CONTROLS (inline) ───────────────────────────
		let drag = false, prev = { x: 0, y: 0 }, theta = 0.4, phi = Math.PI / 2.5, radius = 3.5;
		renderer.domElement.addEventListener('mousedown', e => { drag = true; prev = { x: e.clientX, y: e.clientY }; });
		renderer.domElement.addEventListener('mouseup', () => drag = false);
		renderer.domElement.addEventListener('mousemove', e => {
			if (!drag) return;
			theta -= (e.clientX - prev.x) * 0.005;
			phi -= (e.clientY - prev.y) * 0.005;
			phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));
			prev = { x: e.clientX, y: e.clientY };
		});
		renderer.domElement.addEventListener('wheel', e => {
			radius = Math.max(0.5, Math.min(5, radius + e.deltaY * 0.001));
		});

		// ── GLSL SHADERS ──────────────────────────────────────
		const vertShader = `
  attribute float anomaly;
  attribute float aScale;
  uniform float uTime;
  uniform float uTurbulence;
  varying float vAnomaly;
  varying float vWeight;

  // cheap hash for per-vertex pseudo-random
  float hash(float n) { return fract(sin(n) * 43758.5453123); }

  void main() {
	vAnomaly = anomaly;
	vWeight  = aScale;

	// turbulence jitter: displaces each vertex by a unique oscillating offset
	float id  = position.x * 73.1 + position.y * 127.3 + position.z * 311.7;
	float amt = uTurbulence * 0.12;  // scale factor
	vec3 jitter = vec3(
	  sin(uTime * 5.0 + hash(id)       * 6.28) * amt,
	  sin(uTime * 4.3 + hash(id + 1.0) * 6.28) * amt * 0.6,
	  cos(uTime * 5.7 + hash(id + 2.0) * 6.28) * amt
	);

	vec4 mv  = modelViewMatrix * vec4(position + jitter, 1.0);
	gl_PointSize = 5.0;
	gl_Position  = projectionMatrix * mv;
  }
`;
		const fragShader = `
  varying float vAnomaly;
  varying float vWeight;
  uniform float uTime;
  uniform float uAlert;
  uniform float uTemperature;  // normalised: 0 = cold (10°C), 1 = hot (25°C)

  vec3 heatmap(float t, float tempBias) {
	// tempBias shifts the ramp: <0.5 → colder palette, >0.5 → warmer palette
	t = clamp(t * 0.5 + 0.5 + (tempBias - 0.5) * 0.35, 0.0, 1.0);

	// cold end: desaturated deep blues when temperature is low
	vec3 coldA = mix(vec3(0.02, 0.04, 0.45), vec3(0.0, 0.1, 0.8), tempBias);
	vec3 coldB = mix(vec3(0.15, 0.35, 0.55), vec3(0.0, 0.8, 0.9), tempBias);
	// warm end: intensified reds/yellows when temperature is high
	vec3 warmA = mix(vec3(0.7, 0.6, 0.0), vec3(1.0, 0.85, 0.0), tempBias);
	vec3 warmB = mix(vec3(0.8, 0.15, 0.0), vec3(1.0, 0.1, 0.0), tempBias);

	if (t < 0.25) return mix(coldA, coldB, t * 4.0);
	if (t < 0.5)  return mix(coldB, vec3(0.2, 0.9, 0.2), (t - 0.25) * 4.0);
	if (t < 0.75) return mix(vec3(0.2, 0.9, 0.2), warmA, (t - 0.5) * 4.0);
	return         mix(warmA, warmB, (t - 0.75) * 4.0);
  }

  void main() {
	vec2 uv = gl_PointCoord - 0.5;
	if (dot(uv, uv) > 0.25) discard;
	vec3 col = heatmap(vAnomaly, uTemperature);
	float pulse = uAlert > 0.5 && abs(vAnomaly) > 0.3
	  ? abs(sin(uTime * 4.0)) * uAlert : 0.0;
	col = mix(col, vec3(1.0, 0.15, 0.0), pulse);
	float a = mix(0.04, 0.12, vWeight) + pulse * 0.15;
	gl_FragColor = vec4(col, a);
  }
`;

		// ── SPLAT MESH BUILDER ────────────────────────────────
		let splatMesh, alertPulse = 0.0;
		let bgPulse = 0.0;
		let sceneTarget = new THREE.Vector3(0, -0.3, 0);  // camera lookAt target

		function buildSplatMesh(data) {
			const n = data.length;

			// Auto-normalize x & y so the cloud fills ±0.65 scene units regardless of bounding box
			let xMin=Infinity, xMax=-Infinity, yMin=Infinity, yMax=-Infinity;
			for (const d of data) {
				if (d.x < xMin) xMin = d.x; if (d.x > xMax) xMax = d.x;
				if (d.y < yMin) yMin = d.y; if (d.y > yMax) yMax = d.y;
			}
			const xRange = xMax - xMin || 1, yRange = yMax - yMin || 1;
			const xCen = (xMin + xMax) / 2, yCen = (yMin + yMax) / 2;
			const scale = 1.3 / Math.max(xRange, yRange);  // fit to ±0.65

			const pos = new Float32Array(n * 3);
			const anm = new Float32Array(n);
			const scl = new Float32Array(n);
			for (let i = 0; i < n; i++) {
				pos[i * 3]   = (data[i].x - xCen) * scale;
				pos[i * 3+1] = (data[i].z || 0) * 2.5;    // depth on Y axis vertically stretched
				pos[i * 3+2] = (data[i].y - yCen) * scale;
				anm[i] = data[i].anomaly;
				scl[i] = 1.0 + (data[i].z || 0);          // surface proximity weight
			}
			// Center scene target on the x/z centroid (depth stays at -0.3 mid-water)
			sceneTarget.set(0, -0.3, 0);

			const geo = new THREE.BufferGeometry();
			geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
			geo.setAttribute('anomaly',  new THREE.BufferAttribute(anm, 1));
			geo.setAttribute('aScale',   new THREE.BufferAttribute(scl, 1));
			const mat = new THREE.ShaderMaterial({
				vertexShader: vertShader, fragmentShader: fragShader,
				uniforms: {
					uTime:        { value: 0 },
					uAlert:       { value: 0 },
					uTurbulence:  { value: 0 },
					uTemperature: { value: 0.5 },
				},
				transparent: true, depthWrite: false,
				blending: THREE.AdditiveBlending
			});
			if (splatMesh) scene.remove(splatMesh);
			splatMesh = new THREE.Points(geo, mat);
			scene.add(splatMesh);
		}

		// ── DEMO DATA (fallback if S3 not ready) ─────────────
		function demoSplats() {
			const s = [];
			for (let i = 0; i < 4000; i++)
				s.push({
					x: (Math.random() - 0.5) * 1.6,
					y: (Math.random() - 0.5) * 1.2,
					z: -Math.random(),
					anomaly: (Math.random() - 0.5) * 2,
					scale: 0.003 + Math.random() * 0.002
				});
			return s;
		}
		buildSplatMesh(demoSplats());

		// Subsample to max N points so additive blending doesn't saturate
		function thin(data, max=4000) {
			if (data.length <= max) return data;
			const step = Math.ceil(data.length / max);
			return data.filter((_, i) => i % step === 0);
		}

		// Load splats: try local file first, then S3, then stay on demo data
		fetch('./splats.json')
			.then(r => { if (!r.ok) throw new Error('no local file'); return r.json(); })
			.then(data => { const d=thin(data); console.log(`Loaded ${data.length} local splats → showing ${d.length}`); buildSplatMesh(d); })
			.catch(() =>
				fetch('https://aegis-ocean-data.s3.us-west-2.amazonaws.com/splats.json')
					.then(r => r.json()).then(data => { const d=thin(data); console.log(`Loaded ${data.length} S3 splats → showing ${d.length}`); buildSplatMesh(d); })
					.catch(() => console.log('Using demo splats — run generate_splats.py to get real data'))
			);

		// ── LIVE ARDUINO DOT ─────────────────────────────────
		const liveDot = new THREE.Mesh(
			new THREE.SphereGeometry(0.015, 8, 8),
			new THREE.MeshBasicMaterial({ color: 0x00ffcc })
		);
		liveDot.position.set(-0.1, 0, 0.15);  // approx San Diego on scene
		scene.add(liveDot);

		// ── GRID FLOOR ────────────────────────────────────────
		const floor = new THREE.Mesh(
			new THREE.PlaneGeometry(2, 1.5, 48, 48),
			new THREE.MeshBasicMaterial({
				color: 0x001a33, wireframe: true,
				opacity: 0.15, transparent: true
			})
		);
		floor.rotation.x = -Math.PI / 2;
		floor.position.y = -1.05;
		scene.add(floor);

		// ── RENDER LOOP ───────────────────────────────────────
		const clock = new THREE.Clock();
		renderer.setAnimationLoop(() => {
			const t = clock.getElapsedTime();
			camera.position.x = radius * Math.sin(phi) * Math.sin(theta);
			camera.position.y = radius * Math.cos(phi);
			camera.position.z = radius * Math.sin(phi) * Math.cos(theta);
			camera.lookAt(sceneTarget);
			liveDot.scale.setScalar(1 + 0.3 * Math.sin(t * 3));
			
			if (bgPulse > 0) {
				bgPulse = Math.max(0, bgPulse - 0.015);
				scene.background.lerpColors(colorNormal, colorSpike, bgPulse);
			}

			if (splatMesh) {
				const u = splatMesh.material.uniforms;
				u.uTime.value  = t;
				u.uAlert.value = alertPulse;
				// uTurbulence & uTemperature are set by pollLive()
			}
			renderer.render(scene, camera);
		});

		// ── CONTROLS ──────────────────────────────────────────
		window.setMode = (btn, mode) => {
			document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
			btn.classList.add('active');
			// TODO: rebuild splat anomaly attribute per mode
		};
		window.updateDepth = (val) => {
			document.getElementById('depth-label').textContent = val == 0 ? 'Surface' : `-${val}m`;
		};
		window.enterVR = async () => {
			if (!navigator.xr) { alert('WebXR not supported. Try Meta Quest browser.'); return; }
			const session = await navigator.xr.requestSession('immersive-vr');
			renderer.xr.setSession(session);
		};
		window.addEventListener('resize', () => {
			camera.aspect = innerWidth / innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(innerWidth, innerHeight);
		});

		// ── FRONTEND CALIBRATION & INSIGHTS ───────────────────
		let offsetTemp = 0, offsetDist = 0, offsetTurb = 0;
		let lastRaw = { temp: 0, dist: 0, turb: 0 };
		let currentInsight = "";
		
		window.calibrateSensors = () => {
			offsetTemp = lastRaw.temp;
			offsetDist = lastRaw.dist;
			offsetTurb = lastRaw.turb;
		};

		function typeWriterEffect(elementId, text, speed = 25) {
			const el = document.getElementById(elementId);
			if (!el) return;
			el.innerHTML = "";
			if (window[elementId + 'Timeout']) clearTimeout(window[elementId + 'Timeout']);
			
			let i = 0;
			function type() {
				if (i < text.length) {
					el.innerHTML += text.charAt(i);
					i++;
					window[elementId + 'Timeout'] = setTimeout(type, speed);
				}
			}
			type();
		}

		async function pollLive() {
			try {
				const d = await fetch('http://localhost:5000/live').then(r => r.json());
				
				lastRaw.temp = d.temp;
				lastRaw.dist = d.distance_mm;
				lastRaw.turb = d.turbulence;

				// Push live sensor values into shader uniforms
				if (splatMesh) {
					// uTurbulence: raw m/s² clamped to 0-2 range for jitter intensity
					splatMesh.material.uniforms.uTurbulence.value = Math.min(d.turbulence, 2.0);
					// uTemperature: normalise 10°C→0, 25°C→1 for heatmap palette shift
					splatMesh.material.uniforms.uTemperature.value = Math.max(0, Math.min(1, (d.temp - 10) / 15));
				}

				const displayTemp = (d.temp - offsetTemp).toFixed(1);
				const displayDist = (d.distance_mm - offsetDist).toFixed(0);
				const displayTurb = (Math.max(0, d.turbulence - offsetTurb)).toFixed(2);

				document.getElementById('lv-temp').textContent = displayTemp;
				document.getElementById('lv-dist').textContent = displayDist;
				document.getElementById('lv-turb').textContent = displayTurb;
				
				const badge = document.getElementById('sim-badge');
				if (d.simulated) {
					badge.style.display = 'inline-block';
				} else {
					badge.style.display = 'none';
				}

				if (d.turb_spike) {
					bgPulse = 1.0;
				}

				const statusEl = document.getElementById('lv-status');
				if (d.is_anomaly) {
					alertPulse = 1.0;
					statusEl.textContent = 'ANOMALY'; statusEl.style.color = '#ff4444';
					document.getElementById('alert-text').textContent =
						d.gemini_summary || 'Anomaly detected.';
					if (d.audio_url) {
						const a = document.getElementById('alert-audio');
						a.src = d.audio_url; a.style.display = 'block'; a.play();
					}
				} else {
					alertPulse = 0.0;
					statusEl.textContent = 'NOMINAL'; statusEl.style.color = '#00ff00';
				}

				if (d.scientific_insight && d.scientific_insight !== currentInsight) {
					currentInsight = d.scientific_insight;
					typeWriterEffect('insight-text', currentInsight);
				}
			} catch (e) { }
		}
		setInterval(pollLive, 3000);

		async function pollX() {
			try {
				const posts = await fetch('http://localhost:5000/x-feed').then(r => r.json());
				document.getElementById('x-posts').innerHTML = posts.slice(0, 5)
					.map(p => `<div style='border-bottom:1px solid #333;padding:3px 0;color:#ccc;'>
           	${p.text.substring(0, 90)}...</div>`).join('');
			} catch (e) {
				document.getElementById('x-posts').textContent = 'No signals.';
			}
		}
		setInterval(pollX, 15000);
		pollX();
	</script>
</body>

</html>
